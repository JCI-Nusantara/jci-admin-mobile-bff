name: BFF Staging Build/Deploy

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jci-nusantara/jci-admin-mobile-bff

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate syntax
        run: npm run check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-staging-vm:
    runs-on: ubuntu-latest
    environment: staging
    needs: build-and-push
    if: ${{ secrets.STAGING_VM_HOST != '' && secrets.STAGING_VM_USER != '' && secrets.STAGING_VM_SSH_KEY != '' && secrets.STAGING_VM_STACK_PATH != '' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_SSH_KEY }}
          script_stop: true
          envs: REGISTRY,IMAGE_NAME
          script: |
            export BFF_IMAGE="${REGISTRY}/${IMAGE_NAME}:staging"
            cd "${{ secrets.STAGING_VM_STACK_PATH }}"
            docker compose pull admin-bff
            docker compose up -d admin-bff
            docker image prune -f
