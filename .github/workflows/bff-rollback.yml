name: BFF Rollback (No Slot)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Previous production Git ref to roll back to (tag or commit SHA)
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout rollback ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate syntax
        run: npm run check

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "**/.git/*" "**/node_modules/*" "**/.env" "**/.env.*" "**/coverage/*"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Roll back by redeploying selected ref
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_PROD }}
          package: release.zip

      - name: Post-rollback smoke test
        run: |
          curl -fsS "${{ secrets.BFF_PROD_HEALTH_URL }}"
